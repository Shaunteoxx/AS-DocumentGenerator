steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/microapps-479605/crd-backend:$COMMIT_SHA
      - ./backend

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/microapps-479605/crd-backend:$COMMIT_SHA

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - crd-backend
      - --image=gcr.io/microapps-479605/crd-backend:$COMMIT_SHA
      - --region=asia-southeast1
      - --project=microapps-479605
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_CREDENTIALS_PATH=/secrets/credentials.json,CORRIDOR_BASE_URL=https://www.corridor.cloud,CORRIDOR_CLIENT_ID=cc_mc_0qzgw5o4bpyvo0uhzce17zk1,CORRIDOR_REDIRECT_URI=https://project-xwokx.vercel.app/auth/callback,CORRIDOR_PROJECT_SLUG=crd-generator
      - --set-secrets=GOOGLE_API_KEY=gemini-api-key:latest,/secrets/credentials.json=crd-credentials:latest,CORRIDOR_CLOUD_API_KEY=corridor-api-key:latest,CLICKUP_API_KEY=clickup-api-key:latest

images:
  - gcr.io/microapps-479605/crd-backend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
