steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/microapps-479605/crd-backend:$COMMIT_SHA
      - ./backend

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/microapps-479605/crd-backend:$COMMIT_SHA

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - crd-backend
      - --image=gcr.io/microapps-479605/crd-backend:$COMMIT_SHA
      - --region=asia-southeast1
      - --project=microapps-479605
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_CREDENTIALS_PATH=/secrets/credentials.json
      - --set-secrets=GOOGLE_API_KEY=gemini-api-key:latest,/secrets/credentials.json=crd-credentials:latest

images:
  - gcr.io/microapps-479605/crd-backend:$COMMIT_SHA
